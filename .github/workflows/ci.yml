name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only; jobs that need more declare it themselves.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Branch pin (@stable): dependabot can't bump it — update the SHA by
      # hand when a newer toolchain is wanted.
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace --locked

  lean-build:
    name: build without web feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The web UI must stay optional: --no-default-features compiles it out.
      - run: cargo check --workspace --no-default-features --locked

  web:
    name: web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web
      - run: npm run build
        working-directory: web

  chart:
    name: helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Pinned version + checksum verification, same as the release job.
      - name: Install helm
        run: |
          set -euo pipefail
          v=3.16.3
          curl -fsSLO "https://get.helm.sh/helm-v${v}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/helm-v${v}-linux-amd64.tar.gz.sha256sum"
          sha256sum -c "helm-v${v}-linux-amd64.tar.gz.sha256sum"
          tar xzf "helm-v${v}-linux-amd64.tar.gz"
          sudo install -m 0755 linux-amd64/helm /usr/local/bin/helm
      - name: Lint
        run: helm lint charts/burrow --set burrow.existingSecret=ci
      # Render every template once (validation guards only fire on render).
      - name: Template smoke test
        run: |
          helm template burrow charts/burrow \
            --set burrow.existingSecret=ci \
            --set web.service.enabled=true \
            --set web.ingress.enabled=true \
            --set persistence.blobs.enabled=true >/dev/null

  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check --print-build-logs
