name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            linux: true
            platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            linux: true
            platform: linux/arm64
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Host == target on every runner above, so no cross-compilation: a plain
      # release build lands in target/release, which is what cargo-deb and
      # cargo-generate-rpm expect (their magic target/release/ prefix).
      - name: Build
        run: cargo build --release --bin burrow

      - name: Package tarball
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          target="${{ matrix.target }}"
          staging="burrow-${version}-${target}"
          mkdir -p "$staging/contrib"
          cp target/release/burrow "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          cp contrib/config.example.toml "$staging/"
          cp contrib/burrow.service contrib/com.burrow.daemon.plist "$staging/contrib/"
          tar czf "${staging}.tar.gz" "$staging"

      - name: Install packaging tools
        if: matrix.linux
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build .deb and .rpm
        if: matrix.linux
        shell: bash
        run: |
          mkdir -p dist
          cargo deb -p burrow --no-build
          cargo generate-rpm -p crates/burrow
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: burrow-${{ matrix.target }}
          path: |
            burrow-*.tar.gz
            dist/*.deb
            dist/*.rpm
          if-no-files-found: ignore

      # --- Docker image (Linux targets only) ---
      # Reuse the release binary just built: the `prebuilt` Dockerfile target
      # copies ./burrow, so the image ships the exact same binary as the
      # tarball/.deb/.rpm and there is no second compile. Each arch is built
      # natively on its own runner (no QEMU) and pushed by digest; the
      # docker-image job below stitches the digests into one multi-arch tag.
      - name: Stage the binary and image name
        if: matrix.platform
        shell: bash
        run: |
          cp target/release/burrow burrow
          # GHCR references must be lowercase, but ${{ github.repository }}
          # keeps the owner's original case (Solidsilver) — lowercase it here.
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        if: matrix.platform
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        if: matrix.platform
        uses: docker/setup-buildx-action@v4
      - name: Build and push image by digest
        if: matrix.platform
        id: image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: prebuilt
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        if: matrix.platform
        shell: bash
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${IMAGE_DIGEST#sha256:}"
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
      - name: Upload image digest
        if: matrix.platform
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.target }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect artifacts and checksums
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) \
            -exec cp {} release/ \;
          ( cd release && sha256sum * ) > SHA256SUMS
          mv SHA256SUMS release/
          ls -l release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  homebrew:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    # Skip prereleases (tags containing a hyphen, e.g. v0.1.2-rc.1).
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Render formula
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          sha() { find artifacts -name "burrow-${version}-$1.tar.gz" -exec sha256sum {} \; | awk '{print $1}'; }
          cp packaging/homebrew/burrow.rb.tmpl burrow.rb
          sed -i "s/@@VERSION@@/${version}/g"                       burrow.rb
          sed -i "s/@@SHA256_DARWIN_ARM64@@/$(sha aarch64-apple-darwin)/g"      burrow.rb
          sed -i "s/@@SHA256_LINUX_ARM64@@/$(sha aarch64-unknown-linux-gnu)/g" burrow.rb
          sed -i "s/@@SHA256_LINUX_X86_64@@/$(sha x86_64-unknown-linux-gnu)/g" burrow.rb
          echo "--- rendered Formula/burrow.rb ---"
          cat burrow.rb
      - name: Push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping tap update."
            exit 0
          fi
          git clone "https://x-access-token:${GH_TOKEN}@github.com/solidsilver/homebrew-burrow.git" tap
          mkdir -p tap/Formula
          cp burrow.rb tap/Formula/burrow.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/burrow.rb
          git commit -m "burrow ${GITHUB_REF_NAME#v}" || { echo "no formula changes"; exit 0; }
          git push

  docker-image:
    name: push multi-arch image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - name: Create and push manifest list
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME#v}"
          tags=( -t "${image}:${version}" )
          # Tag :latest only for real releases; prerelease tags contain a hyphen
          # (e.g. v0.1.3-rc.1) and must not move :latest.
          case "$GITHUB_REF_NAME" in
            *-*) echo "prerelease $GITHUB_REF_NAME — not updating :latest" ;;
            *)   tags+=( -t "${image}:latest" ) ;;
          esac
          srcs=()
          for d in digests/*; do srcs+=( "${image}@sha256:$(basename "$d")" ); done
          echo "Combining ${srcs[*]}"
          docker buildx imagetools create "${tags[@]}" "${srcs[@]}"
          docker buildx imagetools inspect "${image}:${version}"
