name: Release

on:
  push:
    tags: ['v*']

# Default to read-only; jobs escalate individually below.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    permissions:
      contents: read
      packages: write # push image digests to GHCR (Linux targets)
      id-token: write # keyless Sigstore identity for attestations
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux builds are pinned to ubuntu-22.04 (glibc 2.35), NOT latest:
          # the binaries are copied unchanged into the debian:bookworm-slim
          # runtime image (glibc 2.36) and installed on users' distros, so
          # they must link against the oldest glibc we support. Building on
          # 24.04 linked GLIBC_2.39 symbols and the binary would not start on
          # bookworm ("version `GLIBC_2.39' not found"). The smoke test below
          # guards this.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            linux: true
            platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            linux: true
            platform: linux/arm64
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Branch pin (@stable): dependabot can't bump it — update the SHA by
      # hand when a newer toolchain is wanted.
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      # Build the web UI first: the release binary embeds web-dist/ via
      # rust-embed (missing assets degrade to a placeholder page, so ordering
      # matters for the published artifacts).
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web UI
        run: npm ci && npm run build
        working-directory: web

      # Host == target on every runner above, so no cross-compilation: a plain
      # release build lands in target/release, which is what cargo-deb and
      # cargo-generate-rpm expect (their magic target/release/ prefix).
      # --locked: refuse to build release artifacts from a drifting lockfile.
      - name: Build
        run: cargo build --release --locked --bin burrow

      # The prebuilt Docker target copies this exact binary into
      # debian:bookworm-slim (glibc 2.36), and tarballs/.debs land on arbitrary
      # distros — prove it actually starts on the runtime image's glibc before
      # anything is packaged or pushed. Fails the release if a runner/image
      # bump ever links a newer glibc again. Digest-pinned to the same image
      # as the Dockerfile runtime stage (bump both together).
      - name: Smoke test on bookworm-slim (runtime image glibc)
        if: matrix.linux
        shell: bash
        run: |
          docker run --rm -v "$PWD/target/release:/out:ro" \
            debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818 \
            /out/burrow --version

      - name: Package tarball
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          target="${{ matrix.target }}"
          staging="burrow-${version}-${target}"
          mkdir -p "$staging/contrib"
          cp target/release/burrow "$staging/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          cp contrib/config.example.toml "$staging/"
          cp contrib/burrow.service contrib/com.burrow.daemon.plist "$staging/contrib/"
          tar czf "${staging}.tar.gz" "$staging"

      # Install from source, NOT taiki-e/install-action: the prebuilt
      # cargo-deb x86_64 binary is itself linked against glibc 2.39 and
      # cannot run on the 22.04 runner ("GLIBC_2.39 not found") — the same
      # trap as the one this workflow was fixed to avoid. Compiling here
      # takes a few minutes but always matches the runner's glibc.
      - name: Install packaging tools
        if: matrix.linux
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build .deb and .rpm
        if: matrix.linux
        shell: bash
        run: |
          mkdir -p dist
          cargo deb -p burrow --no-build
          cargo generate-rpm -p crates/burrow
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: burrow-${{ matrix.target }}
          path: |
            burrow-*.tar.gz
            dist/*.deb
            dist/*.rpm
          if-no-files-found: ignore

      # --- Docker image (Linux targets only) ---
      # Reuse the release binary just built: the `prebuilt` Dockerfile target
      # copies ./burrow, so the image ships the exact same binary as the
      # tarball/.deb/.rpm and there is no second compile. Each arch is built
      # natively on its own runner (no QEMU) and pushed by digest; the
      # docker-image job below stitches the digests into one multi-arch tag.
      - name: Stage the binary and image name
        if: matrix.platform
        shell: bash
        run: |
          cp target/release/burrow burrow
          # GHCR references must be lowercase, but ${{ github.repository }}
          # keeps the owner's original case (Solidsilver) — lowercase it here.
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        if: matrix.platform
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        if: matrix.platform
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build and push image by digest
        if: matrix.platform
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: prebuilt
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
      # SLSA provenance for the image, pushed to GHCR alongside it (the
      # explicit attestation above replaces build-push's own provenance,
      # which stays off so the manifest list stays a plain OCI index).
      - name: Attest image provenance
        if: matrix.platform
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
      - name: Export digest
        if: matrix.platform
        shell: bash
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${IMAGE_DIGEST#sha256:}"
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
      - name: Upload image digest
        if: matrix.platform
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digest-${{ matrix.target }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      packages: write # push the helm chart OCI artifact to GHCR
      id-token: write # keyless Sigstore identity for attestations
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      # Helm is not preinstalled on the runners and has no SHA-pinnable
      # setup action — fetch a pinned version and verify its checksum.
      - name: Install helm
        shell: bash
        run: |
          set -euo pipefail
          v=3.16.3
          curl -fsSLO "https://get.helm.sh/helm-v${v}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/helm-v${v}-linux-amd64.tar.gz.sha256sum"
          sha256sum -c "helm-v${v}-linux-amd64.tar.gz.sha256sum"
          tar xzf "helm-v${v}-linux-amd64.tar.gz"
          sudo install -m 0755 linux-amd64/helm /usr/local/bin/helm
      # The chart is versioned in lockstep with the app: both the chart
      # version and appVersion are stamped from the tag (the values committed
      # in charts/burrow/Chart.yaml are for source checkouts). The packaged
      # .tgz joins release/ so it gets checksummed, attested, and attached
      # to the GitHub release like every other artifact.
      - name: Package helm chart
        shell: bash
        run: |
          mkdir -p release
          version="${GITHUB_REF_NAME#v}"
          helm package charts/burrow --version "$version" --app-version "$version" \
            --destination release/
      - name: Collect artifacts and checksums
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \) \
            -exec cp {} release/ \;
          ( cd release && sha256sum * ) > SHA256SUMS
          mv SHA256SUMS release/
          ls -l release
      # SLSA provenance for every published file (incl. SHA256SUMS);
      # verifiable with `gh attestation verify`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: release/*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
      # The same chart .tgz attached to the release, pushed as an OCI
      # artifact: `helm install oci://ghcr.io/<owner>/charts/burrow`.
      # helm reuses the docker credential store, so one login covers both.
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push chart to GHCR (OCI)
        id: chart
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          repo="ghcr.io/${GITHUB_REPOSITORY,,}/charts"
          # helm push prints Pushed:/Digest: on STDERR, so merge the streams.
          out="$(helm push "release/burrow-${version}.tgz" "oci://${repo}" 2>&1)"
          echo "$out"
          digest="$(printf '%s\n' "$out" | grep -oE 'sha256:[0-9a-f]{64}' | head -1)"
          if [ -z "$digest" ]; then
            echo "::error::could not parse chart digest from helm push output"
            exit 1
          fi
          echo "CHART_IMAGE=${repo}/burrow" >> "$GITHUB_ENV"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      # SLSA provenance for the registry artifact, matching the image job.
      - name: Attest chart provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.CHART_IMAGE }}
          subject-digest: ${{ steps.chart.outputs.digest }}
          push-to-registry: true

  homebrew:
    name: bump homebrew tap
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # pushes use the tap PAT, not GITHUB_TOKEN
    # Skip prereleases (tags containing a hyphen, e.g. v0.1.2-rc.1).
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Render formula
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          sha() {
            local s
            s="$(find artifacts -name "burrow-${version}-$1.tar.gz" -exec sha256sum {} \; | awk '{print $1}')"
            if [ -z "$s" ]; then
              echo "::error::no tarball/sha256 for $1 — refusing an empty formula sha"
              exit 1
            fi
            echo "$s"
          }
          cp packaging/homebrew/burrow.rb.tmpl burrow.rb
          sed -i "s/@@VERSION@@/${version}/g"                       burrow.rb
          sed -i "s/@@SHA256_DARWIN_ARM64@@/$(sha aarch64-apple-darwin)/g"      burrow.rb
          sed -i "s/@@SHA256_LINUX_ARM64@@/$(sha aarch64-unknown-linux-gnu)/g" burrow.rb
          sed -i "s/@@SHA256_LINUX_X86_64@@/$(sha x86_64-unknown-linux-gnu)/g" burrow.rb
          echo "--- rendered Formula/burrow.rb ---"
          cat burrow.rb
      - name: Push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping tap update."
            exit 0
          fi
          # Clone anonymously (taps are public) so the PAT never lands in
          # .git/config; send it only as a one-shot push header. Must be
          # Basic x-access-token auth (what actions/checkout uses): the git
          # endpoint rejects Bearer for PATs with a 401.
          git clone "https://github.com/solidsilver/homebrew-burrow.git" tap
          mkdir -p tap/Formula
          cp burrow.rb tap/Formula/burrow.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/burrow.rb
          git commit -m "burrow ${GITHUB_REF_NAME#v}" || { echo "no formula changes"; exit 0; }
          AUTH="AUTHORIZATION: basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"
          git -c http.https://github.com/.extraheader="$AUTH" push

  docker-image:
    name: push multi-arch image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Create and push manifest list
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME#v}"
          tags=( -t "${image}:${version}" )
          # Tag :latest only for real releases; prerelease tags contain a hyphen
          # (e.g. v0.1.3-rc.1) and must not move :latest.
          case "$GITHUB_REF_NAME" in
            *-*) echo "prerelease $GITHUB_REF_NAME — not updating :latest" ;;
            *)   tags+=( -t "${image}:latest" ) ;;
          esac
          srcs=()
          for d in digests/*; do srcs+=( "${image}@sha256:$(basename "$d")" ); done
          echo "Combining ${srcs[*]}"
          docker buildx imagetools create "${tags[@]}" "${srcs[@]}"
          docker buildx imagetools inspect "${image}:${version}"
