{{- if .Values.burrow.recoveryPhrase }}
# Recovery-phrase Secret created from values. Handy for trying things out —
# but the phrase now sits in your values file, so do not commit that file to
# git. For anything serious, leave burrow.recoveryPhrase empty and manage
# burrow.existingSecret yourself (SOPS, Sealed Secrets, External Secrets...).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "burrow.fullname" . }}
  labels:
    {{- include "burrow.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.burrow.existingSecretKey }}: {{ .Values.burrow.recoveryPhrase | quote }}
{{- end }}
