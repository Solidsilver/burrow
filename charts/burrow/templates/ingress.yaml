{{- if .Values.web.ingress.enabled }}
# Every host you browse by must ALSO be listed in [web] allowed_hosts in the
# config (burrow rejects unknown Host headers as DNS-rebinding protection).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "burrow.fullname" . }}
  labels:
    {{- include "burrow.labels" . | nindent 4 }}
  {{- with .Values.web.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.web.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.web.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.web.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "burrow.fullname" $ }}
                port:
                  name: web
          {{- end }}
    {{- end }}
{{- end }}
