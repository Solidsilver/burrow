apiVersion: v2
name: burrow
description: >-
  Distributed backup among friends, over iroh. Runs the burrow daemon as a
  single-replica StatefulSet with the recovery phrase held in a Kubernetes
  Secret and configuration in a ConfigMap.
type: application
# Chart version: kept in lockstep with the app — the release workflow
# re-stamps both `version` and `appVersion` from the git tag when packaging
# (these values are what source-checkpoint installs fall back to).
version: 0.2.3
# burrow release deployed by default (image tag).
appVersion: "0.2.3"
home: https://github.com/solidsilver/burrow
sources:
  - https://github.com/solidsilver/burrow
keywords:
  - backup
  - p2p
  - iroh
  - selfhosted
license: MIT OR Apache-2.0
