# burrow configuration — lives at ~/.config/burrow/config.toml
# (override the directory with $BURROW_CONFIG_DIR)

[node]
# YOUR name (owner-level, shown to friends). Defaults to the hostname.
name = "me"

[device]
# "host" stores data for you and friends; "client" only backs up (laptops).
mode = "host"
# Set false on laptops: scheduled backups and replication defer while on
# battery and catch up on AC.
run_on_battery = true

[storage]
# Ceiling across every grant you give to friends. Individual grants are made
# at runtime with `burrow grant <peer> <size>` and can't exceed this in total.
offer_max = "500gb"

[repair]
# A peer unseen for this long stops counting as a replica holder and its
# blobs are re-replicated elsewhere.
grace_period = "72h"
# When someone shrinks a grant below what you use, how long you get to move
# data before they may evict it (their setting governs their machine).
evac_window = "14d"
# How often to cryptographically spot-check that peers really hold your data.
verify_interval = "1h"

# [web]
# # Optional web UI + JSON API. Purely additive: the daemon runs exactly the
# # same with it off, and `cargo build --no-default-features` compiles it out.
# enable = true
# # Loopback (default) needs no token. Binding beyond loopback requires the
# # auto-generated token in ~/.config/burrow/web.token (`burrow web token`).
# bind = "127.0.0.1:8385"
# # Loopback trust is by client IP: if the UI sits behind a same-host reverse
# # proxy, every remote client looks like 127.0.0.1 — set this false so all
# # clients need the token.
# trust_loopback = true
# # Requests must carry a recognized Host header — an IP literal, localhost,
# # or a DNS name listed here (DNS-rebinding protection). Add your LAN
# # hostname or proxy vhost when you browse by name instead of IP.
# allowed_hosts = ["burrow.example.com"]

# One [[backup]] block per thing you back up.
[[backup]]
id = "photos"
paths = ["/home/me/photos"]
exclude = ["*.tmp", ".cache/**", "node_modules"]
# Copies kept on distinct devices (your own NAS counts; this machine doesn't).
replicas = 3
# Copies required on OTHER people's machines — the off-site guarantee.
min_offsite = 1
# Standard 5-field crontab; omit for manual-only (`burrow backup run photos`).
schedule = "0 3 * * *"
# Keep only the newest N snapshots; omit to keep all.
keep_last = 30

[[backup]]
id = "documents"
paths = ["/home/me/documents", "/etc/important-configs"]
replicas = 2
schedule = "0 */6 * * *"
